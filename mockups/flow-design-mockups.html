<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Flow map — visual systems study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1420; --ink2:#1b2533; --muted:#5d6b7e; --faint:#8b98a8;
  --page:#e9edf1; --panel:#ffffff; --line:#d7dee6; --line2:#e7ecf1;
  --calm:#2f8f74; --calm-bg:#e7f3ef;
  --warn:#cf922a; --warn-bg:#faf0db;
  --hot:#cf402c;  --hot-bg:#fae3df;
  --vol:#2f6f9f;  --vol-bg:#e4eef6;
  --signal:#cf402c;
  /* design 06 — type hues (queue / human / bot) */
  --t-queue:#3b5bdb; --t-human:#0d9488; --t-bot:#7c4dff;
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--page);color:var(--ink);font-family:var(--body);line-height:1.45;
  -webkit-font-smoothing:antialiased}
.num{font-family:var(--mono);font-feature-settings:"tnum" 1;letter-spacing:-.01em}

/* ---------- page chrome ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:34px 28px 80px}
.masthead{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;
  border-bottom:2px solid var(--ink);padding-bottom:16px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(26px,4vw,40px);line-height:1.02;margin:8px 0 0;
  letter-spacing:-.02em}
h1 em{font-style:normal;color:var(--signal)}
.subject{color:var(--muted);font-size:14px;max-width:48ch;margin-top:8px}
.context{display:flex;gap:0;border:1px solid var(--line);background:var(--panel);border-radius:12px;overflow:hidden}
.context .kpi{padding:10px 16px;border-right:1px solid var(--line2)}
.context .kpi:last-child{border-right:0}
.context .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.context .v{font-family:var(--mono);font-weight:600;font-size:18px;margin-top:2px}
.context .v.hot{color:var(--hot)} .context .v.calm{color:var(--calm)}

/* tabs as an instrument selector */
.tabs{display:flex;gap:6px;margin:26px 0 6px;flex-wrap:wrap}
.tab{appearance:none;background:transparent;border:1px solid var(--line);border-radius:999px;
  padding:9px 16px 9px 12px;cursor:pointer;font-family:var(--body);font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:9px;transition:.15s}
.tab .idx{font-family:var(--mono);font-size:11px;color:var(--faint);border:1px solid var(--line);
  border-radius:5px;padding:1px 5px}
.tab:hover{border-color:var(--ink2);color:var(--ink)}
.tab[aria-selected="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
.tab[aria-selected="true"] .idx{color:#fff;border-color:#3a4760}

.panel{display:none}
.panel.show{display:block;animation:fade .25s ease both}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.panel.show{animation:none}}

.panel-head{display:flex;align-items:baseline;gap:14px;margin:20px 2px 4px;flex-wrap:wrap}
.panel-head h2{font-family:var(--disp);font-weight:600;font-size:22px;margin:0;letter-spacing:-.01em}
.panel-head .tag{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);
  border-radius:6px;padding:2px 8px}
.explain{color:var(--muted);font-size:13.5px;max-width:88ch;margin:6px 2px 18px;line-height:1.5}
.explain b{color:var(--ink);font-weight:600}

/* shared stage */
.stage{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 20px;
  overflow-x:auto}
.flow{display:flex;align-items:center;gap:0;min-width:max-content}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin:14px 2px 0;font-size:11.5px;color:var(--muted);
  font-family:var(--mono)}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:6px}
.swatch-calm{background:var(--calm)} .swatch-warn{background:var(--warn)} .swatch-hot{background:var(--hot)}
.swatch-vol{background:var(--vol)}

/* icons */
.ic{width:18px;height:18px;display:inline-block;vertical-align:middle}
.ic svg{width:100%;height:100%;display:block}
.iconwell{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.iconwell .ic{width:20px;height:20px}

/* value-add pip (3 segments) */
.pip{display:inline-flex;gap:3px;align-items:center}
.pip span{width:6px;height:11px;border-radius:2px;background:var(--line)}
.pip.value span:nth-child(-n+3){background:var(--calm)}
.pip.necessary span:nth-child(-n+2){background:var(--warn)}
.pip.waste span:nth-child(-n+1){background:var(--hot)}
.va-chip{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);
  border:1px solid var(--line);border-radius:999px;padding:3px 9px 3px 7px;white-space:nowrap}

/* connector base */
.conn{flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:var(--faint)}
.conn svg{display:block}

/* contribution timeline (shared hero strip) */
.contrib{margin-top:22px}
.contrib .ttl{display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.contrib .ttl b{font-family:var(--body);text-transform:none;letter-spacing:0;color:var(--ink);font-size:13px}
.cbar{display:flex;height:34px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.cseg{position:relative;display:flex;align-items:center;justify-content:center;color:#fff;
  font-family:var(--mono);font-size:11px;font-weight:600;min-width:2px}
.cseg.touch{background:repeating-linear-gradient(45deg,#3a4760,#3a4760 6px,#46556f 6px,#46556f 12px)}
.cscale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:5px}
.note{font-size:12px;color:var(--muted);margin-top:8px}
.note b{color:var(--ink)}

/* ============================================================
   DESIGN 1 — TONNAGE (size = volume, fill = time severity)
   ============================================================ */
.d1 .flow{align-items:flex-end;gap:0}
.d1 .node{width:128px;flex:0 0 auto;border-radius:12px 12px 10px 10px;padding:12px 12px 10px;
  color:#fff;position:relative;box-shadow:0 1px 0 rgba(0,0,0,.04)}
.d1 .node.calm{background:var(--calm)} .d1 .node.warn{background:var(--warn)} .d1 .node.hot{background:var(--hot)}
.d1 .node.cap{background:var(--ink);width:96px}
.d1 .node .top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.d1 .iconwell{background:rgba(255,255,255,.16)}
.d1 .iconwell .ic svg{stroke:#fff}
.d1 .nm{font-size:12px;font-weight:600;line-height:1.2}
.d1 .files{font-family:var(--mono);font-weight:600;font-size:30px;line-height:1;letter-spacing:-.02em;display:flex;align-items:baseline;gap:6px}
.d1 .files small{font-size:11px;font-weight:500;opacity:.85}
.d1 .stack-ic{width:16px;height:16px;opacity:.9}
.d1 .stack-ic svg{stroke:#fff}
.d1 .time{display:flex;align-items:center;justify-content:space-between;margin-top:8px;
  font-family:var(--mono);font-size:12px;border-top:1px solid rgba(255,255,255,.25);padding-top:6px}
.d1 .vaband{position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:4px}
.d1 .node.cap .nm{margin:0;text-align:center}
.d1 .conn{height:60px;width:22px;color:#aeb9c6}

/* ============================================================
   DESIGN 2 — INSTRUMENT CARDS (uniform, dual meters)
   ============================================================ */
.d2 .node{width:178px;flex:0 0 auto;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:0;overflow:hidden}
.d2 .strip{height:5px} .d2 .calm>.strip{background:var(--calm)} .d2 .warn>.strip{background:var(--warn)}
.d2 .hot>.strip{background:var(--hot)} .d2 .cap>.strip{background:var(--ink)}
.d2 .body{padding:12px 13px 13px}
.d2 .top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.d2 .iconwell{background:var(--page);border:1px solid var(--line)}
.d2 .iconwell .ic svg{stroke:var(--ink)}
.d2 .nm{font-size:13px;font-weight:600;line-height:1.15}
.d2 .role{font-size:11px;color:var(--faint)}
.d2 .meter{margin-top:9px}
.d2 .meter .ml{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.d2 .meter .ml .mv{font-family:var(--mono);font-weight:600;color:var(--ink);font-size:13px;letter-spacing:0;text-transform:none}
.d2 .track{height:8px;background:var(--page);border-radius:5px;overflow:hidden}
.d2 .fill{height:100%;border-radius:5px}
.d2 .fill.vol{background:var(--vol)}
.d2 .fill.calm{background:var(--calm)} .d2 .fill.warn{background:var(--warn)} .d2 .fill.hot{background:var(--hot)}
.d2 .foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.d2 .cap .body{display:grid;place-items:center;min-height:150px;text-align:center}
.d2 .cap .nm{font-size:13px}
.d2 .conn{width:26px;color:#aeb9c6}

/* ============================================================
   DESIGN 3 — RESERVOIRS (pipeline; map = timeline; tanks fill with backlog)
   ============================================================ */
.d3 .stage{padding:8px 14px 18px}
.d3 svg{display:block;min-width:1040px;width:100%;height:auto}
.d3 .cap-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);padding:0 6px}

/* ============================================================
   DESIGN 4 — CONTRIBUTION HEAT (the bar is the hero; arrows weighted by flow)
   ============================================================ */
.d4 .flow{align-items:center}
.d4 .node{width:120px;flex:0 0 auto;border:1px solid var(--line);border-radius:11px;padding:11px 11px 12px;
  background:var(--panel);position:relative}
.d4 .node .top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.d4 .iconwell{width:28px;height:28px;border-radius:8px;background:var(--page);border:1px solid var(--line)}
.d4 .iconwell .ic{width:17px;height:17px} .d4 .iconwell .ic svg{stroke:var(--ink)}
.d4 .nm{font-size:11.5px;font-weight:600;line-height:1.15}
.d4 .share{font-family:var(--mono);font-weight:600;font-size:26px;line-height:1;letter-spacing:-.02em}
.d4 .share small{font-size:11px;opacity:.7}
.d4 .sub{display:flex;justify-content:space-between;align-items:center;margin-top:9px;
  font-family:var(--mono);font-size:11px;color:var(--muted)}
.d4 .filechip{display:inline-flex;align-items:center;gap:5px;background:var(--vol-bg);color:var(--vol);
  border-radius:6px;padding:2px 6px;font-weight:600}
.d4 .filechip .ic{width:13px;height:13px} .d4 .filechip .ic svg{stroke:var(--vol)}
.d4 .conn{flex:0 0 auto;width:34px;display:flex;flex-direction:column;align-items:center;color:var(--faint)}
.d4 .flowpipe{background:var(--vol);border-radius:2px;opacity:.55}
.d4 .conn .vlab{font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:3px}
.d4 .cap{width:84px;text-align:center;background:var(--ink);color:#fff;border-color:var(--ink)}
.d4 .cap .nm{color:#fff}

/* ============================================================
   DESIGN 5 — SYNTHESIS
   ============================================================ */
.d5 .node{width:186px;flex:0 0 auto;background:var(--panel);border:1px solid var(--line);
  border-left-width:5px;border-radius:12px;padding:13px 14px 14px;position:relative}
.d5 .node.calm{border-left-color:var(--calm)} .d5 .node.warn{border-left-color:var(--warn)}
.d5 .node.hot{border-left-color:var(--hot)}
.d5 .node.cap{border-left-color:var(--ink);width:96px;text-align:center;display:grid;place-items:center;min-height:150px}
.d5 .flag{position:absolute;top:-11px;right:10px;background:var(--hot);color:#fff;font-family:var(--mono);
  font-size:10px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:6px;display:flex;gap:5px;align-items:center}
.d5 .flag .ic{width:12px;height:12px} .d5 .flag .ic svg{stroke:#fff}
.d5 .top{display:flex;align-items:center;gap:10px}
.d5 .iconwell{background:var(--page);border:1px solid var(--line)}
.d5 .iconwell .ic svg{stroke:var(--ink)}
.d5 .nm{font-size:13px;font-weight:600;line-height:1.15}
.d5 .role{font-size:11px;color:var(--faint)}
.d5 .reservoir{margin-top:12px}
.d5 .rl{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
.d5 .rl b{font-family:var(--mono);font-size:16px;color:var(--ink);letter-spacing:0}
.d5 .tank{height:12px;background:var(--page);border:1px solid var(--line);border-radius:4px;overflow:hidden;position:relative}
.d5 .tank .lvl{height:100%;background:var(--vol);opacity:.85}
.d5 .timerow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;
  padding-top:10px;border-top:1px solid var(--line2)}
.d5 .tbadge{font-family:var(--mono);font-weight:600;font-size:14px;padding:2px 8px;border-radius:6px}
.d5 .tbadge.calm{background:var(--calm-bg);color:var(--calm)}
.d5 .tbadge.warn{background:var(--warn-bg);color:var(--warn)}
.d5 .tbadge.hot{background:var(--hot-bg);color:var(--hot)}
.d5 .conn{width:30px;color:#aeb9c6;display:flex;flex-direction:column;align-items:center}
.d5 .conn .flowpipe{background:var(--vol);border-radius:2px;opacity:.5}

/* ============================================================
   DESIGN 6 — REFINED SYNTHESIS (shape-led · type-hued · branching)
   ============================================================ */
.d6 .stage{padding:0;overflow:auto}
.d6 .canvas{position:relative;margin:0 auto}
.d6 .wires{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
.d6 .wires path{fill:none;stroke:#c2ccd8;stroke-width:2}
.d6 .wires path.hot{stroke:var(--hot);stroke-width:3}
.d6 .wires path.loop{stroke:#aab6c4;stroke-dasharray:5 4}
.d6 .wires .wlabel{font-family:var(--mono);font-size:9.5px;fill:var(--faint)}

.d6 .node{position:absolute;width:172px;background:var(--panel);
  border:1.5px solid var(--t);border-radius:13px;padding:11px 12px 12px;
  box-shadow:0 1px 2px rgba(14,20,32,.05)}
.d6 .top{display:flex;align-items:flex-start;gap:9px}
.d6 .iconwell{width:30px;height:30px;border-radius:8px;background:var(--t);display:grid;place-items:center;flex:0 0 auto}
.d6 .iconwell .ic{width:17px;height:17px} .d6 .iconwell .ic svg{stroke:#fff}
.d6 .nm{font-size:12.5px;font-weight:600;line-height:1.18;min-height:30px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* tank-fill gauge — the hero metric */
.d6 .gauge{margin-top:11px}
.d6 .gl{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;
  text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}
.d6 .gl b{font-family:var(--mono);font-size:16px;color:var(--ink);letter-spacing:0}
.d6 .gl .u{font-size:9.5px;color:var(--faint)}
.d6 .tank{height:11px;background:var(--page);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.d6 .tank .lvl{height:100%;background:var(--t);opacity:.9;border-radius:3px}

/* time + % row (severity lives in the badge) */
.d6 .timerow{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.d6 .tl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.d6 .tbadge{font-family:var(--mono);font-weight:600;font-size:12.5px;padding:2px 8px;border-radius:6px;white-space:nowrap}
.d6 .tbadge .ic{width:11px;height:11px;vertical-align:-1px;margin-right:3px}
.d6 .tbadge.calm{background:var(--calm-bg);color:var(--calm)} .d6 .tbadge.calm .ic svg{stroke:var(--calm)}
.d6 .tbadge.warn{background:var(--warn-bg);color:var(--warn)} .d6 .tbadge.warn .ic svg{stroke:var(--warn)}
.d6 .tbadge.hot{background:var(--hot-bg);color:var(--hot)}   .d6 .tbadge.hot .ic svg{stroke:var(--hot)}

/* status / owner / value icon-row (worded labels → glyphs, decoded by the legend) */
.d6 .iconrow{display:flex;align-items:center;gap:9px;margin-top:10px;padding-top:8px;border-top:1px solid var(--line2);min-height:23px}
.d6 .iconrow .ri{width:15px;height:15px;display:inline-flex}
.d6 .iconrow .ri .ic{width:15px;height:15px} .d6 .iconrow .ri .ic svg{stroke:var(--muted)}

/* every container is identical — type reads from icon + hue only */
.d6 .node{border-radius:13px}

/* start / end caps */
.d6 .node.cap{width:auto;min-width:60px;padding:9px 16px;border-color:var(--ink);
  border-radius:999px;background:var(--ink);color:#fff;text-align:center;display:grid;place-items:center}
.d6 .node.cap .nm{color:#fff;font-size:11.5px}

/* bottleneck flag */
.d6 .flag{position:absolute;top:-11px;right:12px;background:var(--hot);color:#fff;font-family:var(--mono);
  font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:6px;
  display:flex;gap:5px;align-items:center;z-index:4}
.d6 .flag .ic{width:11px;height:11px} .d6 .flag .ic svg{stroke:#fff}

/* type + icon legend for 06 */
.d6-legend{display:flex;gap:8px 16px;flex-wrap:wrap;align-items:center;margin:14px 2px 0;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.d6-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:6px}
.d6-legend .ic{width:14px;height:14px;vertical-align:-3px;margin-right:4px} .d6-legend .ic svg{stroke:var(--muted)}
.d6-legend .sep{width:1px;height:13px;background:var(--line);display:inline-block}
.d6-legend .grp{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}

/* synthesis provenance chips */
.prov{display:flex;gap:8px;flex-wrap:wrap;margin:2px 2px 16px}
.prov .p{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel);
  border:1px solid var(--line);border-radius:7px;padding:4px 9px}
.prov .p b{color:var(--ink);font-weight:600}

footer{margin-top:40px;color:var(--faint);font-size:12px;font-family:var(--mono);text-align:center}

@media (max-width:640px){
  .context{flex-wrap:wrap}
  .context .kpi{flex:1 1 40%}
}
</style>
</head>
<body>
<!-- icon library -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ic-human" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.9 3.1-6.6 7-6.6s7 2.7 7 6.6"/>
  </symbol>
  <symbol id="ic-bot" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="3" x2="12" y2="5.5"/><circle cx="12" cy="2.4" r="1.1" fill="currentColor" stroke="none"/>
    <rect x="4.5" y="6" width="15" height="12.5" rx="3.2"/><circle cx="9.5" cy="12" r="1.3" fill="currentColor" stroke="none"/>
    <circle cx="14.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><line x1="9.5" y1="15.4" x2="14.5" y2="15.4"/>
  </symbol>
  <symbol id="ic-queue" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="14.5" width="18" height="5" rx="1.2"/><rect x="5.5" y="9" width="13" height="4" rx="1.2"/>
    <rect x="8" y="4" width="8" height="3.4" rx="1.2"/>
  </symbol>
  <symbol id="ic-stack" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3 3 7.5 12 12l9-4.5L12 3Z"/><path d="M3 12l9 4.5L21 12"/><path d="M3 16.5 12 21l9-4.5"/>
  </symbol>
  <symbol id="ic-flag" viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3 22 20H2L12 3Z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17" r=".6" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="ic-flow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="19" y2="12"/><path d="M14 7l5 5-5 5"/>
  </symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.4"/><path d="M12 7.6V12l3 1.8"/>
  </symbol>
  <!-- value-classification glyphs: shape carries meaning (kept monochrome) -->
  <symbol id="ic-val-value" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3.2l2.5 5.1 5.6.8-4.05 3.95.96 5.6L12 16.0l-5 2.65.96-5.6L3.9 9.1l5.6-.8L12 3.2Z"/>
  </symbol>
  <symbol id="ic-val-necessary" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3l7 2.6v5.2c0 4.4-3 7.4-7 9.2-4-1.8-7-4.8-7-9.2V5.6L12 3Z"/><path d="M9.2 12l2 2 3.6-3.8"/>
  </symbol>
  <symbol id="ic-val-waste" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6.5" cy="7" r="2.4"/><circle cx="6.5" cy="17" r="2.4"/><path d="M8.7 8.6 20 17M8.7 15.4 20 7"/>
  </symbol>
  <!-- state + owner glyphs for the card icon-row (decoded by the legend) -->
  <symbol id="ic-wait" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6.5 3h11M6.5 21h11"/><path d="M8 3v3.2L12 11l4-4.8V3"/><path d="M8 21v-3.2L12 13l4 4.8V21"/>
  </symbol>
  <symbol id="ic-own-ops" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.1"/>
    <path d="M12 2.6v2.4M12 19v2.4M2.6 12h2.4M19 12h2.4M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M18.8 5.2l-1.7 1.7M6.9 17.1l-1.7 1.7"/>
  </symbol>
  <symbol id="ic-own-uw" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="4" width="14" height="17" rx="2.2"/><path d="M9.2 4V2.8h5.6V4"/><path d="M8.5 10h7M8.5 13.6h7M8.5 17.2h4.4"/>
  </symbol>
  <symbol id="ic-own-sys" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4.5" width="16" height="6" rx="1.6"/><rect x="4" y="13.5" width="16" height="6" rx="1.6"/>
    <circle cx="7.4" cy="7.5" r=".75" fill="currentColor" stroke="none"/><circle cx="7.4" cy="16.5" r=".75" fill="currentColor" stroke="none"/>
  </symbol>
</svg>

<div class="wrap">
  <header class="masthead">
    <div>
      <div class="eyebrow">Visual systems study · flow maps</div>
      <h1>Where does the work <em>pool</em>?</h1>
      <p class="subject">Six visual languages for one Lean value stream — an insurance underwriting flow — each trying to make backlog, wait time, and the breaking points obvious at a glance.</p>
    </div>
    <div class="context" id="contextKpis"></div>
  </header>

  <div class="tabs" id="tabs" role="tablist"></div>

  <section class="panel" id="panel-0" role="tabpanel"></section>
  <section class="panel" id="panel-1" role="tabpanel"></section>
  <section class="panel" id="panel-2" role="tabpanel"></section>
  <section class="panel" id="panel-3" role="tabpanel"></section>
  <section class="panel" id="panel-4" role="tabpanel"></section>
  <section class="panel" id="panel-5" role="tabpanel"></section>

  <footer>Dummy data · underwriting value stream · for design comparison only</footer>
</div>

<script>
"use strict";
/* ---------------- dummy value stream ---------------- */
const NODES = [
  {kind:"start", name:"Request received"},
  {kind:"queue", name:"Intake queue",         files:42, hours:18},
  {kind:"human", name:"Intake & setup",        files:6,  hours:0.5, role:"Ops",        va:"necessary"},
  {kind:"queue", name:"Awaiting documents",    files:60, hours:36},
  {kind:"human", name:"Verification",          files:9,  hours:1.2, role:"Ops",        va:"necessary"},
  {kind:"queue", name:"Underwriting backlog",  files:31, hours:24},
  {kind:"human", name:"Underwriting decision", files:5,  hours:2.0, role:"Underwriter",va:"value"},
  {kind:"bot",   name:"Issue & bind",          files:3,  hours:0.6, role:"Policy system",va:"value"},
  {kind:"end",   name:"Policy delivered"},
];
const FLOW = NODES.filter(n=>n.hours!=null);
const TOTAL = FLOW.reduce((s,n)=>s+n.hours,0);
const TOUCH = FLOW.filter(n=>n.kind!=="queue").reduce((s,n)=>s+n.hours,0);
const WAIT  = TOTAL-TOUCH;
const EFF   = Math.round(TOUCH/TOTAL*100);
const MAXFILES = Math.max(...FLOW.map(n=>n.files));
const MAXHOURS = Math.max(...FLOW.map(n=>n.hours));
const share = n => n.hours/TOTAL;
const sev = s => s>=0.30?"hot":s>=0.15?"warn":"calm";
const worst = FLOW.slice().sort((a,b)=>b.hours-a.hours)[0];
const COL = {calm:"#2f8f74",warn:"#cf922a",hot:"#cf402c",vol:"#2f6f9f",ink:"#0e1420"};
const SEVNAME = {hot:"Critical",warn:"Watch",calm:"Healthy"};
/* design 06 — node type hues (mirror the CSS vars) */
const TYPECOL = {queue:"#3b5bdb", human:"#0d9488", bot:"#7c4dff"};
const typeHue = n => TYPECOL[n.kind] || COL.ink;

/* helpers */
const ic = (id,cls="") => `<span class="ic ${cls}"><svg><use href="#${id}"/></svg></span>`;
const iconFor = n => n.kind==="human"?"ic-human": n.kind==="bot"?"ic-bot":"ic-queue";
const fmt = h => (Math.round(h*10)/10);
const pct = n => Math.round(share(n)*100);
const vaLabel = {value:"Adds value",necessary:"Necessary",waste:"Could remove"};
const vaPip = va => va?`<span class="va-chip"><span class="pip ${va}"><span></span><span></span><span></span></span>${vaLabel[va]}</span>`:"";
const connChevron = `<span class="conn">${ic("ic-flow")}</span>`;

/* ---------------- context KPIs ---------------- */
document.getElementById("contextKpis").innerHTML = `
  <div class="kpi"><div class="k">Turnaround</div><div class="v num">${fmt(TOTAL)}<small> h</small></div></div>
  <div class="kpi"><div class="k">Flow efficiency</div><div class="v num calm">${EFF}%</div></div>
  <div class="kpi"><div class="k">Files in process</div><div class="v num">${FLOW.reduce((s,n)=>s+n.files,0)}</div></div>
  <div class="kpi"><div class="k">Breaking point</div><div class="v hot" style="font-family:var(--body);font-size:14px">${worst.name}</div></div>`;

/* ---------------- shared contribution bar ---------------- */
function contribBar(opts={}){
  const byType=!!opts.byType;
  const segs = FLOW.map(n=>{
    const w=share(n)*100; const isQ=n.kind==="queue";
    let bg, cls="";
    if(byType){ bg=typeHue(n); }                       // colour-match the cards by type
    else { bg=isQ?`var(--${sev(share(n))})`:""; cls=isQ?"":"touch"; }
    const lbl = w>5? `${pct(n)}%` : "";
    return `<div class="cseg ${cls}" style="width:${w}%;${bg?`background:${bg}`:""}" title="${n.name}: ${fmt(n.hours)} h">${lbl}</div>`;
  }).join("");
  const note = byType
    ? `Segments are coloured by <b>type</b> — the same palette as the cards, so a band lines up with its node at a glance. <b>${worst.name}</b> alone is ${pct(worst)}% of turnaround.`
    : `Hatched = touch time (value-add work). Solid = queues, coloured by severity. <b>${worst.name}</b> alone is ${pct(worst)}% of turnaround.`;
  return `<div class="contrib">
    <div class="ttl"><span><b>Time contribution across the stream</b></span><span>${fmt(TOTAL)} h total · ${EFF}% value-add</span></div>
    <div class="cbar">${segs}</div>
    <div class="cscale"><span>start</span><span>delivered</span></div>
    <div class="note">${note}</div>
  </div>`;
}
const sevLegend = `<div class="legend">
  <span><i class="swatch-calm"></i>Healthy</span><span><i class="swatch-warn"></i>Watch</span>
  <span><i class="swatch-hot"></i>Critical</span><span><i class="swatch-vol"></i>Files in queue</span></div>`;

/* ============================================================ DESIGN 1 — TONNAGE */
function design1(){
  const H = (n)=>{ // node height scales with files (60..150px)
    return 60 + (n.files/MAXFILES)*92;
  };
  const node = n=>{
    if(n.kind==="start"||n.kind==="end")
      return `<div class="node cap" style="height:84px;display:grid;place-items:center"><div class="nm">${n.name}</div></div>`;
    const s=sev(share(n));
    return `<div class="node ${s}" style="height:${H(n)}px">
      <div class="vaband" style="background:${n.va?`var(--${n.va==='value'?'calm':n.va==='necessary'?'warn':'hot'})`:'rgba(255,255,255,.4)'}"></div>
      <div class="top"><span class="iconwell">${ic(iconFor(n))}</span><span class="nm">${n.name}</span></div>
      <div class="files">${n.files}<span class="stack-ic">${ic("ic-stack")}</span><small>files</small></div>
      <div class="time"><span>avg wait</span><span>${fmt(n.hours)} h</span></div>
    </div>`;
  };
  const row = NODES.map((n,i)=> node(n) + (i<NODES.length-1?`<span class="conn">${ic("ic-flow")}</span>`:"")).join("");
  return `<div class="stage d1"><div class="flow">${row}</div></div>${sevLegend}${contribBar()}`;
}

/* ============================================================ DESIGN 2 — INSTRUMENT CARDS */
function design2(){
  const node = n=>{
    if(n.kind==="start"||n.kind==="end")
      return `<div class="node cap"><div class="strip"></div><div class="body"><div class="nm">${n.name}</div></div></div>`;
    const s=sev(share(n));
    const fileW=Math.max(4,n.files/MAXFILES*100), timeW=Math.max(4,n.hours/MAXHOURS*100);
    return `<div class="node ${s}">
      <div class="strip"></div>
      <div class="body">
        <div class="top"><span class="iconwell">${ic(iconFor(n))}</span>
          <span><span class="nm">${n.name}</span><br><span class="role">${n.role||"queue"}</span></span></div>
        <div class="meter"><div class="ml"><span>Files</span><span class="mv num">${n.files}</span></div>
          <div class="track"><div class="fill vol" style="width:${fileW}%"></div></div></div>
        <div class="meter"><div class="ml"><span>Avg time</span><span class="mv num">${fmt(n.hours)} h</span></div>
          <div class="track"><div class="fill ${s}" style="width:${timeW}%"></div></div></div>
        <div class="foot">${vaPip(n.va)||`<span class="va-chip">${SEVNAME[s]}</span>`}</div>
      </div></div>`;
  };
  const row = NODES.map((n,i)=> node(n) + (i<NODES.length-1?`<span class="conn">${ic("ic-flow")}</span>`:"")).join("");
  return `<div class="stage d2"><div class="flow">${row}</div></div>${sevLegend}${contribBar()}`;
}

/* ============================================================ DESIGN 3 — RESERVOIRS (SVG, map=timeline) */
function design3(){
  const PX=11.2, PAD=24, GAP=34, STEP_W=52, TANK_MIN=64, H=300, MID=150;
  let x=PAD; const parts=[]; const caps=[];
  const pipe=[];
  NODES.forEach((n)=>{
    if(n.kind==="start"||n.kind==="end"){
      parts.push(`<g><circle cx="${x+12}" cy="${MID}" r="9" fill="#0e1420"/>
        <text x="${x+12}" y="${MID-22}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#5d6b7e">${n.kind==="start"?"in":"out"}</text></g>`);
      caps.push({x:x+12,name:n.name}); pipe.push(x+12); x+=46; return;
    }
    if(n.kind==="queue"){
      const w=Math.max(TANK_MIN, n.hours*PX);
      const lvl=n.files/MAXFILES, s=sev(share(n));
      const tankH=120, ty=MID-tankH/2, fillH=tankH*lvl;
      const col=COL[s];
      parts.push(`<g>
        <rect x="${x}" y="${ty}" width="${w}" height="${tankH}" rx="9" fill="#eef2f6" stroke="#d7dee6"/>
        <clipPath id="clip${x|0}"><rect x="${x}" y="${ty}" width="${w}" height="${tankH}" rx="9"/></clipPath>
        <rect clip-path="url(#clip${x|0})" x="${x}" y="${ty+tankH-fillH}" width="${w}" height="${fillH}" fill="${col}" opacity="0.85"/>
        <rect x="${x}" y="${ty}" width="${w}" height="${tankH}" rx="9" fill="none" stroke="${s==='hot'?col:'#c7d0da'}" stroke-width="${s==='hot'?2.5:1}"/>
        <text x="${x+w/2}" y="${MID-2}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="22" fill="#0e1420">${n.files}</text>
        <text x="${x+w/2}" y="${MID+16}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#5d6b7e">files</text>
        <text x="${x+w/2}" y="${ty-10}" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#0e1420">${n.name}</text>
        <text x="${x+w/2}" y="${ty+tankH+18}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="${col}">${fmt(n.hours)} h wait</text>
        ${s==='hot'?`<g transform="translate(${x+w-16},${ty+10})"><use href="#ic-flag" width="14" height="14" stroke="${col}"/></g>`:""}
      </g>`);
      pipe.push(x, x+w); x+=w+GAP; return;
    }
    // work step = valve node on the pipe
    const col = n.kind==="bot"?"#2f6f9f":"#0e1420";
    parts.push(`<g>
      <circle cx="${x+STEP_W/2}" cy="${MID}" r="22" fill="#ffffff" stroke="${col}" stroke-width="2"/>
      <g transform="translate(${x+STEP_W/2-9},${MID-9})"><use href="#${iconFor(n)}" width="18" height="18" stroke="${col}"/></g>
      <text x="${x+STEP_W/2}" y="${MID-34}" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#0e1420">${n.name}</text>
      <text x="${x+STEP_W/2}" y="${MID+44}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10.5" fill="#5d6b7e">${n.files} f · ${fmt(n.hours)} h</text>
      ${n.va?`<circle cx="${x+STEP_W/2+16}" cy="${MID-16}" r="4.5" fill="${n.va==='value'?COL.calm:n.va==='necessary'?COL.warn:COL.hot}"/>`:""}
    </g>`);
    pipe.push(x, x+STEP_W); x+=STEP_W+GAP; return;
  });
  const W=x+PAD;
  const pipeLine=`<line x1="${PAD}" y1="${MID}" x2="${W-PAD}" y2="${MID}" stroke="#c7d0da" stroke-width="6" stroke-linecap="round"/>`;
  return `<div class="stage d3">
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMinYMid meet" style="min-width:${W}px">
      ${pipeLine}${parts.join("")}
    </svg>
    <div class="cap-row" style="max-width:${W}px"><span>← horizontal distance = time spent (the map is the timeline)</span><span>tank fill = backlog of files</span></div>
  </div>${sevLegend}
  <div class="note" style="margin-left:2px">Touch steps barely occupy the line; the two full tanks — <b>${worst.name}</b> and Underwriting backlog — are where the stream's time actually goes.</div>`;
}

/* ============================================================ DESIGN 4 — CONTRIBUTION HEAT */
function design4(){
  const heat = s => { // tint from page->severity by share
    const c=COL[sev(s)]; const a=0.10+ (Math.min(s,0.45)/0.45)*0.8;
    return `background:${hexA(c,a)};border-color:${hexA(c,Math.min(1,a+0.15))}`;
  };
  const node = n=>{
    if(n.kind==="start"||n.kind==="end")
      return `<div class="node cap"><div class="nm">${n.name}</div></div>`;
    const sc=sev(share(n)), col=COL[sc];
    return `<div class="node" style="${heat(share(n))}">
      <div class="top"><span class="iconwell">${ic(iconFor(n))}</span><span class="nm">${n.name}</span></div>
      <div class="share" style="color:${col}">${pct(n)}<small>%</small></div>
      <div class="sub"><span class="filechip">${ic("ic-stack")}${n.files}</span><span>${fmt(n.hours)} h</span></div>
    </div>`;
  };
  // arrow weight by files flowing into the next data node
  const row = NODES.map((n,i)=>{
    let conn="";
    if(i<NODES.length-1){
      const nxt = NODES.slice(i+1).find(x=>x.files!=null) || {files:4};
      const w=3+ (nxt.files/MAXFILES)*16;
      conn=`<span class="conn"><span class="flowpipe" style="height:${w}px;width:34px"></span><span class="vlab">${nxt.files} f</span></span>`;
    }
    return node(n)+conn;
  }).join("");
  return `<div class="stage d4"><div class="flow">${row}</div></div>
    <div class="legend"><span>node heat &amp; % = share of total turnaround</span><span><i class="swatch-vol"></i>arrow thickness = files flowing</span></div>
    ${contribBar()}`;
}
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); const r=n>>16,g=(n>>8)&255,b=n&255;
  return `rgba(${r},${g},${b},${a.toFixed(2)})`; }

/* ============================================================ DESIGN 5 — SYNTHESIS */
function design5(){
  const node = n=>{
    if(n.kind==="start"||n.kind==="end")
      return `<div class="node cap"><div class="nm">${n.name}</div></div>`;
    const s=sev(share(n)), isQ=n.kind==="queue";
    const lvl=Math.round(n.files/MAXFILES*100);
    const flag = n.name===worst.name ? `<div class="flag">${ic("ic-flag")}BOTTLENECK</div>`:"";
    return `<div class="node ${s}">
      ${flag}
      <div class="top"><span class="iconwell">${ic(iconFor(n))}</span>
        <span><span class="nm">${n.name}</span><br><span class="role">${isQ?"queue · waiting":n.role}</span></span></div>
      <div class="reservoir">
        <div class="rl"><span>${isQ?"Files in queue":"Files in hand"}</span><b class="num">${n.files}</b></div>
        <div class="tank"><div class="lvl" style="width:${lvl}%;${s==='hot'?'background:var(--hot);opacity:.8':''}"></div></div>
      </div>
      <div class="timerow">
        ${vaPip(n.va)||`<span class="role">throughput</span>`}
        <span class="tbadge ${s}">${fmt(n.hours)} h · ${pct(n)}%</span>
      </div>
    </div>`;
  };
  const row = NODES.map((n,i)=>{
    let conn="";
    if(i<NODES.length-1){
      const nxt=NODES.slice(i+1).find(x=>x.files!=null)||{files:4};
      const w=3+(nxt.files/MAXFILES)*14;
      conn=`<span class="conn"><span class="flowpipe" style="height:${w}px;width:30px"></span></span>`;
    }
    return node(n)+conn;
  }).join("");
  const prov=`<div class="prov">
    <span class="p"><b>Uniform card</b> ← Instrument cards</span>
    <span class="p"><b>Tank fill = backlog</b> ← Reservoirs</span>
    <span class="p"><b>Severity badge + border</b> ← Tonnage</span>
    <span class="p"><b>Weighted arrows + contribution bar</b> ← Heat</span>
    <span class="p"><b>Bottleneck flag</b> ← new</span></div>`;
  return prov+`<div class="stage d5"><div class="flow">${row}</div></div>${sevLegend}${contribBar()}`;
}

/* ============================================================ DESIGN 6 — REFINED SYNTHESIS */
function design6(){
  /* --- branching graph: fixed w/h so HTML cards & SVG wires line up --- */
  const CW=172, CH=172, CAPW=72, CAPH=38;
  // metrics mirror NODES; x/y place a left→right spine with two side-branches + a rework loop
  const G = {
    start:{kind:"start", name:"Request received",                            x:8,    y:117},
    qin:  {kind:"queue", name:"Intake queue",        files:42, hours:18,     x:120,  y:50},
    hset: {kind:"human", name:"Intake & setup",      files:6,  hours:0.5, role:"Ops",         va:"necessary", x:330, y:50},
    qdoc: {kind:"queue", name:"Awaiting documents",  files:60, hours:36,     x:540,  y:50},   // worst → bottleneck
    hver: {kind:"human", name:"Verification",        files:9,  hours:1.2, role:"Ops",         va:"necessary", x:750, y:50},
    hold: {kind:"queue", name:"Holding · missing docs",files:14, hours:8,    x:750,  y:300},  // branch + loop back to hver
    quw:  {kind:"queue", name:"Underwriting backlog",files:31, hours:24,     x:960,  y:50},
    hdec: {kind:"human", name:"Underwriting decision",files:5, hours:2.0, role:"Underwriter",  va:"value",     x:1170,y:50},
    href: {kind:"queue", name:"Referral hold",       files:7,  hours:10,     x:1170, y:300},  // branch that merges forward
    biss: {kind:"bot",   name:"Issue & bind",        files:3,  hours:0.6, role:"Policy system",va:"value",     x:1380,y:50},
    end:  {kind:"end",   name:"Policy delivered",                            x:1592, y:117},
  };
  const E = [
    ["start","qin","right","left"], ["qin","hset","right","left"],
    ["hset","qdoc","right","left"], ["qdoc","hver","right","left"],
    ["hver","quw","right","left"],  ["quw","hdec","right","left"],
    ["hdec","biss","right","left"], ["biss","end","right","left"],
    ["hver","hold","bottom","top"],                       // branch out to holding
    ["hold","hver","left","bottom", {loop:true}],         // rework loop back
    ["hdec","href","bottom","top"],                       // branch out to referral hold
    ["href","biss","right","left"],                       // merge forward
  ];

  const dims = n => (n.kind==="start"||n.kind==="end") ? {w:CAPW,h:CAPH} : {w:CW,h:CH};
  const NRM = {right:[1,0], left:[-1,0], top:[0,-1], bottom:[0,1]};
  const port = (n,side)=>{ const {w,h}=dims(n);
    const cx=n.x+w/2, cy=n.y+h/2;
    if(side==="right")  return {x:n.x+w, y:cy};
    if(side==="left")   return {x:n.x,   y:cy};
    if(side==="top")    return {x:cx,    y:n.y};
    return {x:cx, y:n.y+h}; };
  const pathD = (p1,n1,p2,n2)=>{ const d=Math.hypot(p2.x-p1.x,p2.y-p1.y), k=Math.max(48,d/3);
    return `M${p1.x},${p1.y} C${p1.x+n1[0]*k},${p1.y+n1[1]*k} ${p2.x+n2[0]*k},${p2.y+n2[1]*k} ${p2.x},${p2.y}`; };

  /* --- wires (SVG layer, drawn under the cards) --- */
  const marker = (id,col)=>`<marker id="${id}" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${col}"/></marker>`;
  const wireDefs = `<defs>${marker("ar6","#aab6c4")}${marker("ar6h",COL.hot)}${marker("ar6l","#aab6c4")}</defs>`;
  const wires = E.map(([a,b,sa,sb,o={}])=>{
    const na=G[a], nb=G[b];
    const p1=port(na,sa), p2=port(nb,sb);
    const onHot = na.name===worst.name || nb.name===worst.name;       // edges feeding the bottleneck
    const cls = o.loop ? "loop" : (onHot ? "hot" : "");
    const mk  = o.loop ? "ar6l" : (onHot ? "ar6h" : "ar6");
    return `<path class="${cls}" marker-end="url(#${mk})" d="${pathD(p1,NRM[sa],p2,NRM[sb])}"/>`;
  }).join("");

  /* --- worded labels → glyphs (state / owner / value), all decoded by the legend --- */
  const STATE = {state:["ic-wait","Queue · waiting"]};
  const OWNER = {"Ops":["ic-own-ops","Ops"],"Underwriter":["ic-own-uw","Underwriter"],"Policy system":["ic-own-sys","Policy system"]};
  const VALUE = {value:["ic-val-value","Valued"],necessary:["ic-val-necessary","Necessary"],waste:["ic-val-waste","Could remove"]};
  const ri = pair => pair ? `<span class="ri" title="${pair[1]}">${ic(pair[0])}</span>` : "";
  const iconRow = n => {
    const isQ=n.kind==="queue";
    const items = isQ
      ? [STATE.state]
      : [OWNER[n.role]||["ic-human",n.role||"Owner"], VALUE[n.va]];
    return `<div class="iconrow">${items.map(ri).join("")}</div>`;
  };

  /* --- one identical card for every container --- */
  const card = n=>{
    const {w,h}=dims(n);
    if(n.kind==="start"||n.kind==="end")
      return `<div class="node cap" style="left:${n.x}px;top:${n.y}px;width:${w}px;height:${h}px"><div class="nm">${n.name}</div></div>`;
    const isQ=n.kind==="queue", s=sev(share(n)), lvl=Math.round(n.files/MAXFILES*100);
    const flag = n.name===worst.name ? `<div class="flag">${ic("ic-flag")}BOTTLENECK</div>`:"";
    return `<div class="node ${n.kind}" style="left:${n.x}px;top:${n.y}px;width:${w}px;height:${h}px;--t:${typeHue(n)}">
      ${flag}
      <div class="top"><span class="iconwell">${ic(iconFor(n))}</span><span class="nm">${n.name}</span></div>
      <div class="gauge">
        <div class="gl"><span>${isQ?"Files in queue":"Files in hand"}</span><b class="num">${n.files}<span class="u"> f</span></b></div>
        <div class="tank"><div class="lvl" style="width:${lvl}%"></div></div>
      </div>
      <div class="timerow"><span class="tl">Time</span>
        <span class="tbadge ${s}">${ic("ic-clock")}${fmt(n.hours)} h · ${pct(n)}%</span></div>
      ${iconRow(n)}
    </div>`;
  };

  const W = 1672, H = 510;
  const cards = Object.values(G).map(card).join("");
  const d6Legend = `<div class="d6-legend">
    <span class="grp">Type</span>
    <span><i style="background:var(--t-queue)"></i>Queue</span>
    <span><i style="background:var(--t-human)"></i>Human</span>
    <span><i style="background:var(--t-bot)"></i>Bot</span>
    <span class="sep"></span><span class="grp">State / owner</span>
    <span>${ic("ic-wait")}Waiting</span>
    <span>${ic("ic-own-ops")}Ops</span>
    <span>${ic("ic-own-uw")}Underwriter</span>
    <span>${ic("ic-own-sys")}Policy system</span>
    <span class="sep"></span><span class="grp">Value</span>
    <span>${ic("ic-val-value")}Valued</span>
    <span>${ic("ic-val-necessary")}Necessary</span>
    <span>${ic("ic-val-waste")}Could remove</span>
    <span class="sep"></span>
    <span>badge colour = severity · ${ic("ic-flag")}bottleneck</span></div>`;
  return `<div class="stage d6">
      <div class="canvas" style="width:${W}px;height:${H}px">
        <svg class="wires" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${wireDefs}${wires}</svg>
        ${cards}
      </div></div>
    ${d6Legend}
    <div class="note" style="margin-left:2px">Every container is <b>identical</b> — type reads from the icon + <b>hue</b> (which matches the contribution band below). The tank-fill gauge and time badge are fixed; the bottom <b>icon row</b> carries the categorical labels (state · owner · value), decoded by the legend. Flow can <b>branch to holding zones and loop back</b> for rework — see <b>Verification</b>.</div>
    ${contribBar({byType:true})}`;
}

/* ---------------- tabs ---------------- */
const DESIGNS = [
  {id:"01", name:"Tonnage", tag:"size = volume",
   note:`Each node's <b>height grows with the number of files</b> piled on it, and its <b>fill colour ramps with how much of total turnaround it burns</b> — so the eye is pulled to the tallest, reddest blocks first. Time sits as a small figure; the value-add rating is a thin coloured rib. Strategy: make volume a physical mass you can't miss. Trade-off: rows get uneven, and exact times are de-emphasised.`,
   render:design1},
  {id:"02", name:"Instrument cards", tag:"standardised",
   note:`Every step is the <b>same card</b> with two labelled meters — <b>Files</b> (steel blue) and <b>Avg time</b> (severity colour) — each against a faint max track. Uniformity is the point: you compare like-for-like down the line and read two numbers per step. Strategy: standardise the unit of reading. Trade-off: less instantly dramatic than size or heat.`,
   render:design2},
  {id:"03", name:"Reservoirs", tag:"map = timeline",
   note:`The map <b>is</b> the timeline: horizontal distance equals time spent, so the two big waits physically dominate the width while touch steps shrink to dots on the pipe. Queues are <b>tanks that fill with backlog</b> (level = files), and a critical tank flushes red with a flag. Strategy: one metaphor — pooling — carries both time and volume. Trade-off: the most custom to build and read.`,
   render:design3},
  {id:"04", name:"Contribution heat", tag:"the bar is the hero",
   note:`Nodes shrink to compact chips <b>tinted by their share of total turnaround</b>, each showing that share as a bold %, with <b>arrows that thicken with the files flowing</b> through. The headline is the stacked <b>contribution bar</b>: it names the biggest time sinks outright. Strategy: lead with proportion, not position. Trade-off: per-step detail is intentionally thin.`,
   render:design4},
  {id:"05", name:"Synthesis", tag:"best of 01–04",
   note:`The uniform card (02) for readability, the <b>tank-fill backlog gauge</b> (03), a <b>severity badge + left border</b> for time (01), <b>flow-weighted arrows + the contribution bar</b> (04), plus an explicit <b>bottleneck flag</b> on the worst step. One consistent, scannable unit that still surfaces volume, time, value-add, who does the work, and exactly where flow breaks.`,
   render:design5},
  {id:"06", name:"Refined synthesis", tag:"uniform card · type-hue · branching",
   note:`A refinement of 05 driven by feedback. <b>Every container is identical</b> — same shape, same size — so type reads purely from the <b>icon + hue</b> (cards and the contribution band share one palette). Each card holds the same slots: type icon, two title lines, the tank-fill gauge + number, the <b>time · %</b> badge (coloured by severity), and a bottom <b>icon row</b> that turns the wordy labels (state · owner · value) into glyphs decoded by the legend. The map is a <b>free canvas</b> — flow can branch to holding zones and <b>loop back for rework</b>.`,
   render:design6},
];

const tabsEl=document.getElementById("tabs");
DESIGNS.forEach((d,i)=>{
  const b=document.createElement("button");
  b.className="tab"; b.setAttribute("role","tab"); b.setAttribute("aria-selected", i===0?"true":"false");
  b.innerHTML=`<span class="idx">${d.id}</span>${d.name}`;
  b.onclick=()=>select(i);
  tabsEl.appendChild(b);
  const p=document.getElementById("panel-"+i);
  p.innerHTML=`<div class="panel-head"><h2>${d.id} · ${d.name}</h2><span class="tag">${d.tag}</span></div>
    <p class="explain">${d.note}</p>${d.render()}`;
});
function select(i){
  DESIGNS.forEach((_,j)=>{
    document.getElementById("panel-"+j).classList.toggle("show", i===j);
    tabsEl.children[j].setAttribute("aria-selected", i===j?"true":"false");
  });
}
select(0);
</script>
</body>
</html>
